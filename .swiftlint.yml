included:
  - Sources
  - Tests

excluded:
  - .build

disabled_rules:
  - trailing_comma
  - identifier_name
  - type_name

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - fatal_error_message
  - implicitly_unwrapped_optional
  - overridden_super_call
  - redundant_nil_coalescing
  - vertical_whitespace_closing_braces

line_length:
  warning: 140
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 80
  error: 120

cyclomatic_complexity:
  warning: 20
  error: 35
